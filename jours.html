<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nombre de jours</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: "Segoe UI", Arial, sans-serif;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1e1e2f, #0b0b12);
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        padding: 2rem;
    }

    /* Bouton retour */
    .back-btn {
        position: fixed;
        top: 15px;
        left: 15px;
        padding: 8px 18px;
        font-size: 15px;
        font-weight: bold;
        border-radius: 25px;
        border: none;
        background: linear-gradient(135deg, #00ffa2, #00c3ff);
        color: black;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 0 12px rgba(0,195,255,0.3);
        z-index: 1000;
    }
    .back-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,195,255,0.7); }

    .card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 2.5rem 3rem;
        width: 100%;
        max-width: 500px;
        text-align: center;
    }

    h2 {
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 0.4rem;
    }

    .subtitle {
        font-size: 14px;
        color: rgba(255,255,255,0.4);
        margin-bottom: 2rem;
    }

    /* Champs date */
    .field {
        margin-bottom: 1.2rem;
        text-align: left;
    }

    .field label {
        display: block;
        font-size: 13px;
        color: rgba(255,255,255,0.45);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 0.5rem;
    }

    .field input[type="date"] {
        width: 100%;
        padding: 0.75rem 1.2rem;
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 14px;
        color: white;
        font-size: 16px;
        font-family: "Segoe UI", Arial, sans-serif;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        color-scheme: dark;
    }

    .field input[type="date"]:focus {
        border-color: #00c3ff;
        box-shadow: 0 0 8px rgba(0,195,255,0.3);
    }

    /* Checkbox */
    .checkbox-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 1.4rem 0 1.8rem;
        cursor: pointer;
        user-select: none;
    }

    .checkbox-row input[type="checkbox"] {
        display: none;
    }

    .custom-checkbox {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(0,0,0,0.3);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .checkbox-row:hover .custom-checkbox {
        border-color: rgba(0,195,255,0.5);
    }

    .checkbox-row input[type="checkbox"]:checked + .custom-checkbox {
        background: linear-gradient(135deg, #00ffa2, #00c3ff);
        border-color: transparent;
        box-shadow: 0 0 10px rgba(0,195,255,0.4);
    }

    .custom-checkbox::after {
        content: "";
        display: none;
        width: 6px;
        height: 10px;
        border: 2px solid black;
        border-top: none;
        border-left: none;
        transform: rotate(45deg) translateY(-1px);
    }

    .checkbox-row input[type="checkbox"]:checked + .custom-checkbox::after {
        display: block;
    }

    .checkbox-label {
        font-size: 15px;
        color: rgba(255,255,255,0.75);
    }

    /* Bouton */
    .btn {
        width: 100%;
        padding: 13px;
        font-size: 17px;
        font-weight: bold;
        border-radius: 30px;
        border: none;
        background: linear-gradient(135deg, #00ffa2, #00c3ff);
        color: black;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 0 15px rgba(0,195,255,0.4);
    }
    .btn:hover { transform: scale(1.03); box-shadow: 0 0 25px rgba(0,195,255,0.7); }
    .btn:active { transform: scale(0.97); }

    /* Résultat */
    .result {
        display: none;
        margin-top: 1.8rem;
    }

    .separator {
        height: 1px;
        background: rgba(255,255,255,0.08);
        margin-bottom: 1.8rem;
    }

    .result-label {
        font-size: 12px;
        color: rgba(255,255,255,0.4);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.6rem;
    }

    .result-number {
        font-size: 72px;
        font-weight: bold;
        line-height: 1;
        background: linear-gradient(90deg, #00ffa2, #00c3ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.3rem;
    }

    .result-unit {
        font-size: 18px;
        color: rgba(255,255,255,0.5);
        margin-bottom: 1.2rem;
    }

    .result-details {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        flex-wrap: wrap;
    }

    .detail-chip {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 0.5rem 1rem;
        font-size: 13px;
        color: rgba(255,255,255,0.5);
    }

    .detail-chip span {
        color: rgba(255,255,255,0.85);
        font-weight: 500;
    }

    /* Erreur */
    .error-msg {
        color: #ff6b6b;
        font-size: 13px;
        margin-top: 0.8rem;
        display: none;
    }
</style>
</head>
<body>

<a class="back-btn" href="index.html">← Retour</a>

<div class="card">
    <h2>📅 Nombre de jours</h2>
    <p class="subtitle">Calculez l'intervalle entre deux dates</p>

    <div class="field">
        <label>Date de départ</label>
        <input type="date" id="dateStart" oninput="clearResult()" />
    </div>

    <div class="field">
        <label>Date d'arrivée</label>
        <input type="date" id="dateEnd" oninput="clearResult()" />
    </div>

    <label class="checkbox-row" for="includeToday">
        <input type="checkbox" id="includeToday" onchange="clearResult()" />
        <div class="custom-checkbox"></div>
        <span class="checkbox-label">Inclure le jour actuel</span>
    </label>

    <button class="btn" onclick="calculate()">Calculer</button>
    <p class="error-msg" id="errorMsg"></p>

    <div class="result" id="result">
        <div class="separator"></div>
        <div class="result-label">Résultat</div>
        <div class="result-number" id="resultNumber">0</div>
        <div class="result-unit" id="resultUnit">jours</div>
        <div class="result-details">
            <div class="detail-chip">Semaines : <span id="detailWeeks">—</span></div>
            <div class="detail-chip">Mois : <span id="detailMonths">—</span></div>
        </div>
    </div>
</div>

<script>
    // Pré-remplir avec la date d'aujourd'hui
    const today = new Date();
    const todayStr = today.toISOString().split("T")[0];
    document.getElementById("dateStart").value = todayStr;
    document.getElementById("dateEnd").value = todayStr;

    function clearResult() {
        document.getElementById("result").style.display = "none";
        document.getElementById("errorMsg").style.display = "none";
    }

    function calculate() {
        const startVal = document.getElementById("dateStart").value;
        const endVal   = document.getElementById("dateEnd").value;
        const includeToday = document.getElementById("includeToday").checked;
        const errorMsg = document.getElementById("errorMsg");

        if (!startVal || !endVal) {
            errorMsg.textContent = "⚠ Veuillez remplir les deux dates.";
            errorMsg.style.display = "block";
            return;
        }

        const start = new Date(startVal);
        const end   = new Date(endVal);

        if (end < start) {
            errorMsg.textContent = "⚠ La date d'arrivée doit être après la date de départ.";
            errorMsg.style.display = "block";
            return;
        }

        errorMsg.style.display = "none";

        // Calcul en jours
        const msPerDay = 1000 * 60 * 60 * 24;
        let days = Math.round((end - start) / msPerDay);
        if (includeToday) days += 1;

        // Détails
        const weeks  = (days / 7).toFixed(1);
        const months = (days / 30.44).toFixed(1);

        document.getElementById("resultNumber").textContent = days;
        document.getElementById("resultUnit").textContent   = days <= 1 ? "jour" : "jours";
        document.getElementById("detailWeeks").textContent  = weeks;
        document.getElementById("detailMonths").textContent = months;

        document.getElementById("result").style.display = "block";
    }

    // Valider avec Entrée
    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") calculate();
    });
</script>

</body>
</html>
